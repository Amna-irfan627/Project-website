<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dealer Portal | EcoSmart </title>
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dealer-primary: #0f172a; 
            --dealer-accent: #10b981;  
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://img.freepik.com/free-photo/cartoon-ai-robot-scene_23-2151675081.jpg');
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .portal-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--dealer-accent);
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .form-label {
            color: var(--dealer-primary);
            font-weight: 700;
            font-size: 0.75rem;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px 15px;
            font-size: 0.9rem;
        }

        .form-control:focus {
            border-color: var(--dealer-accent);
            box-shadow: none;
            background: #f0fdf4;
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            color: #64748b;
        }

        .login-btn {
            background: var(--dealer-primary);
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 25px 0;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="portal-badge">OFFICIAL DEALER LOGIN</div>
    <h2 class="fw-bold mb-1" style="color: var(--dealer-primary);">Dealer Access</h2>
    <p class="text-muted small mb-4">Please enter your credentials to manage your center</p>

    <form class="text-start">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label text-uppercase">Dealer ID</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fas fa-hashtag"></i></span>
                    <input type="text" class="form-control border-start-0" placeholder="e.g. DLR-001">
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label text-uppercase">Dealer Name</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" placeholder="Full Name">
                </div>
            </div>

            <div class="col-md-12">
                <label class="form-label text-uppercase">Contact No</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fas fa-phone"></i></span>
                    <input type="tel" class="form-control border-start-0" placeholder="+92 XXX XXXXXXX">
                </div>
            </div>

            <div class="col-md-12">
                <label class="form-label text-uppercase">Location / Sector</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fas fa-map-marker-alt"></i></span>
                    <input type="text" class="form-control border-start-0" placeholder="e.g. Sector G-11, Kasur">
                </div>
            </div>

            <div class="col-md-12">
                <label class="form-label text-uppercase">Password</label>
                <div class="input-group">
                    <span class="input-group-text border-end-0"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control border-start-0" placeholder="••••••••">
                </div>
            </div>
        </div>

       <button type="button" onclick="window.location.href='scarp-dealer-dashboard.html'" class="login-btn mt-4">
    LOGIN TO DEALER DASHBOARD
</button>
    </form>

    <div class="divider"></div>
    <p class="text-muted small">Need technical support? <a href="#" class="text-success fw-bold text-decoration-none">Contact Admin</a></p>
</div>

</body>
</html>

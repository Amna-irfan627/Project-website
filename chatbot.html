<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoSmart  | Assistant</title>
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #0f172a;
            --emerald: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.85);
        }

        body { 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://img.freepik.com/free-vector/robot-android-realistic-3d-composition-with-heads-anthropomorphous-characters-with-wires-plastic-faces_1284-28637.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .chat-container {
            width: 100%;
            max-width: 950px;
            height: 85vh;
            background: rgb(255 255 255);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            background: rgba(15, 23, 42, 0.95);
            padding: 20px 30px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .bot-profile {
            display: flex;
            align-items: center;
        }

        .bot-img {
            width: 45px;
            height: 45px;
            background: white;
            padding: 5px;
            border-radius: 12px;
            margin-right: 15px;
        }
        .chat-container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            height: 80vh;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

.chat-body {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); /* Subtle pattern */
        }

        .message {
            margin-bottom: 25px;
            max-width: 75%;
            padding: 16px 22px;
            border-radius: 22px;
            font-size: 1rem;
            line-height: 1.6;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .message.ai {
            background: white;
            color: #1e293b !important;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .message.user {
            background: linear-gradient(135deg, var(--emerald), #059669);
            color: white !important;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .chat-footer {
            padding: 25px 35px;
            background: rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .chat-input-group {
            background: white;
            border-radius: 50px;
            padding: 8px 10px 8px 25px;
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .chat-input-group input {
            border: none;
            background: transparent;
            padding: 10px;
            flex: 1;
            color: #0f172a;
            font-weight: 500;
            outline: none;
        }

        .send-btn {
            background: var(--emerald);
            color: white;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .send-btn:hover { 
            transform: scale(1.1) rotate(-10deg); 
            background: #059669; 
        }

        .chat-body::-webkit-scrollbar { width: 6px; }
        .chat-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="chat-container">
        <div class="chat-header">
            <div class="bot-profile">
                <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="bot-img" alt="AI">
                <div>
                    <h6 class="mb-0 fw-bold">EcoBot Assistant</h6>
                    <small class="text-success"><i class="fas fa-circle font-xs me-1"></i> Online</small>
                </div>
            </div>
            <div class="header-actions">
                <i class="fas fa-search me-3 cursor-pointer opacity-75"></i>
                <i class="fas fa-ellipsis-v cursor-pointer opacity-75"></i>
            </div>
        </div>

        <div id="chatBody" class="chat-body d-flex flex-column">
            <div class="message ai">
                Hello! I am your <strong>EcoSmart </strong>. Point your camera at waste or ask me anything about your wastage! 🌿
            </div>

            <div class="message user">
                Can you tell me the current price of plastic scrap?
            </div>

            <div class="message ai shadow-sm">
                <strong>Current Plastic Rates (PET):</strong><br>
                Price: <span class="text-dark fw-bold">Rs. 45/kg</span> <br>
                Trend: <span class="text-success"><i class="fas fa-arrow-up"></i> Rising</span> <br><br>
                Would you like me to find the nearest disposal center for you?
            </div>
        </div>

        <div class="chat-footer">
            <div class="chat-input-group">
                <i class="far fa-smile text-muted fs-5 me-2"></i>
                <input id="chatInput" type="text" placeholder="Ask about scrap rates, locations...">
                <button id="sendBtn" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    const chatBody = document.getElementById('chatBody');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (event) => {
        if (event.key === 'Enter') {
            sendMessage();
        }
    });

    function createMessage(text, role) {
        const message = document.createElement('div');
        message.className = `message ${role}`;
        message.innerHTML = text;
        return message;
    }

    function appendMessage(text, role) {
        const message = createMessage(text, role);
        chatBody.appendChild(message);
        chatBody.scrollTop = chatBody.scrollHeight;
        return message;
    }

    async function sendMessage() {
        const prompt = chatInput.value.trim();
        if (!prompt) return;

        appendMessage(prompt, 'user');
        chatInput.value = '';
        const loadingMessage = appendMessage('Thinking...', 'ai');

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer 236e655830msh37fc14b13ffd139p14ddaejsn0fb59189b61d'// Replace with your actual OpenAI API key
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        { role: 'system', content: 'You are EcoSmart Assistant. Help users with recycling, scrap pricing, and waste disposal information.' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.7,
                    max_tokens: 250
                })
            });

            if (!response.ok) {
                const errorText = await response.text();
                loadingMessage.innerHTML = `Error: ${response.status} ${response.statusText}`;
                console.error('OpenAI API error', response.status, response.statusText, errorText);
                return;
            }

            const data = await response.json();
            const reply = data.choices?.[0]?.message?.content?.trim() || 'Sorry, I could not get a response.';
            loadingMessage.innerHTML = reply;
        } catch (error) {
            loadingMessage.innerHTML = 'Sorry, something went wrong while contacting the AI service.';
            console.error(error);
        }
    }
</script>

</body>
</html>

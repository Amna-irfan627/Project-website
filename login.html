<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoSmart </title>
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url('https://img.freepik.com/free-photo/plastic-garbage-conveyor-belt-waste-recycling-factory-workers-background_1268-23440.jpg?w=1480');
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 25px;
            padding: 45px;
            width: 100%;
            max-width: 450px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

       
        .form-control {
            background: rgba(15, 23, 42, 0.7) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff !important;
            padding: 14px 18px;
            border-radius: 12px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .form-control:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
            background: rgba(15, 23, 42, 0.9) !important;
        }

        .form-label {
            color: #f8fafc;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group-text {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
            border-radius: 12px 0 0 12px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-recycle me-2"></i>ECOSMART </a>
            <div class="ms-auto">
                <a href="register.html" class="nav-link text-white">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="text-center mb-5">
                <div class="mb-3">
                    <i class="fas fa-user-circle fa-4x text-success"></i>
                </div>
                <h2 class="fw-bold text-white mb-2">Welcome <span style="color: var(--accent-color);">Back</span></h2>
                <p style="color: #94a3b8;">Login to manage your waste smarter.</p>
            </div>

            <form action="general-dashboard.html">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control shadow-none" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control shadow-none" placeholder="Enter password" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label text-dim" for="remember" style="font-size: 0.85rem; color: #94a3b8;">Remember Me</label>
                    </div>
                    <a href="#" class="text-success text-decoration-none" style="font-size: 0.85rem;">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-ai w-100 py-3 mb-4 shadow-lg" onclick="window.location.href='general-public-dashboard.html'">LOGIN NOW</button>
                
                <div class="text-center">
                    <span style="color: #94a3b8;">Don't have an account? </span>
                    <a href="register.html" class="text-success text-decoration-none fw-bold">Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <footer class="py-3 text-center border-top border-secondary" style="background: #0f172a;">
        <p class="text-dim mb-0">&copy; 2026 EcoSmart System</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Waste Identifier | EcoSmart AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .scanner-container {
            min-height: 90vh;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .camera-view {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            border: 4px solid #1e293b;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.2);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            top: 0;
            z-index: 10;
            animation: scanMove 3s linear infinite;
        }

        @keyframes scanMove {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .scanner-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            width: 250px;
            z-index: 20;
            color: white;
        }

        .detection-box {
            position: absolute;
            border: 2px dashed var(--accent-color);
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
        }

        .controls-panel {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            margin-top: -50px;
            position: relative;
            z-index: 30;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .placeholder-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-recycle me-2"></i>ECOSMART AI</a>
            <div class="ms-auto">
                <a href="index.html" class="btn btn-outline-ai btn-sm">Exit Scanner</a>
            </div>
        </div>
    </nav>

    <section class="scanner-container flex-column">
        <div class="text-center mb-4">
            <h2 class="text-white fw-bold">Live <span style="color: var(--accent-color);">AI Identifier</span></h2>
            <p class="text-dim">Point your camera at any waste material to classify it.</p>
        </div>

        <div class="camera-view">
            <div class="scan-line"></div>

            <div class="detection-box">
                <div class="corner-tl"></div>
                Analyzing...
            </div>

            <img src="https://images.unsplash.com/photo-1595273670150-bd0c3c392e46?auto=format&fit=crop&q=80&w=1200" class="placeholder-img" alt="Camera Feed">

            <div class="scanner-overlay">
                <h6 class="text-success mb-2"><i class="fas fa-microchip me-2"></i>AI ANALYSIS</h6>
                <div class="mb-3">
                    <small class="text-dim">Object Detected:</small>
                    <h5 class="mb-0">Plastic Bottle</h5>
                </div>
                <div class="mb-3">
                    <small class="text-dim">Material:</small>
                    <h5 class="mb-0">PET (Grade 1)</h5>
                </div>
                <div class="mb-0">
                    <small class="text-dim">Recyclable:</small>
                    <h5 class="text-success">YES (100%)</h5>
                </div>
            </div>
        </div>

        <div class="controls-panel text-center">
            <div class="row g-3 align-items-center">
                <div class="col-md-4">
                    <button class="btn btn-outline-ai w-100 py-3">
                        <i class="fas fa-upload me-2"></i> Upload
                    </button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-ai w-100 py-3 rounded-pill shadow-lg">
                        <i class="fas fa-camera fa-lg"></i>
                    </button>
                </div>
                <div class="col-md-4">
                    <button class="btn btn-outline-ai w-100 py-3">
                        <i class="fas fa-history me-2"></i> History
                    </button>
                </div>
            </div>
        </div>
    </section>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

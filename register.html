<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join EcoSmart  | Register</title>
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://img.freepik.com/free-photo/plastic-garbage-conveyor-belt-waste-recycling-factory-workers-background_1268-23440.jpg?w=1480');
            background-size: cover;
            background-position: center;
            padding: 80px 0;
        }
        .register-card {
            background: rgb(30 41 59 / 0%);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent-color);
            color: white;
            box-shadow: none;
        }
        .form-label {
            color: var(--text-dim);
            font-weight: 500;
            margin-bottom: 8px;
        }
        .input-group-text {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
            border-radius: 10px 0 0 10px;
        }
        .form-select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 10px;
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.8) !important;
            opacity: 1; /* Firefox fix */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-recycle me-2"></i>ECOSMART </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-ai" href="register.html">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="auth-container">
        <div class="container d-flex justify-content-center">
            <div class="register-card">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-white">Create <span style="color: var(--accent-color);">Account</span></h2>
                    <p class="text-dim">Join the smart waste revolution today.</p>
                </div>

                <form action="login.html">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-phone"></i></span>
                            <input type="tel" class="form-control" placeholder="+92 300 1234567" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Register As</label>
                        <select class="form-select">
                            <option value="public">General Public (User)</option>
                            <option value="dealer">Scrap Dealer</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="terms">
                        <label class="form-check-label text-dim" for="terms" style="font-size: 0.85rem;">
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>

                    <button type="submit" class="btn btn-ai w-100 py-3 mb-3">Register Now</button>
                    <script>
                        document.querySelector('form').addEventListener('submit', function(e) {
                            e.preventDefault();
                            const role = document.querySelector('select').value;
                            if (role === 'public') {
                                window.location.href = 'general-public-dashboard.html';
                            } else {
                                window.location.href = 'scrap-dealer-dashboard.html';
                            }
                        });
                    </script>
                    <div class="text-center">
                        <p class="text-dim mb-0">Already have an account? <a href="login.html" class="text-success text-decoration-none fw-bold">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer class="py-4 text-center">
        <div class="container">
            <p class="text-dim mb-0">&copy; 2026 EcoSmart . Built for a Cleaner Planet.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

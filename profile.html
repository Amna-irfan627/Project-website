<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | EcoSmart AI</title>
        <link rel="icon" type="image/png" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
<link rel="apple-touch-icon" href="https://media.istockphoto.com/id/1384532150/vector/recycle-symbol-inside-circle-with-leaves-zero-waste-concept.jpg?s=612x612&w=0&k=20&c=lQPT8cj_dpkQBxa1G4Y6RzDz5vLog6OmWERx-vGpF_Y=">
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-light: #f8fafc;
        }
        body { background-color: var(--bg-light); }

        .profile-header {
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1611262588024-d12430b98920?q=80&w=1000');
            background-size: cover;
            height: 200px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .profile-card {
            margin-top: -100px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 30px;
            border: 1px solid #e2e8f0;
        }

        .user-avatar-wrapper {
            position: relative;
            width: 150px;
            margin: 0 auto 20px;
        }

        .user-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--accent-color);
            color: white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            cursor: pointer;
        }

        .nav-pills .nav-link {
            color: #000000;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 10px;
        }

        .nav-pills .nav-link.active {
            background-color: var(--accent-color);
            color: white;
        }

        .stat-card-mini {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .form-control {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 10px;
        }

        .nav-pills .nav-link {
    color: #000000 !important; 
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 10px;
    transition: all 0.3s ease;
    background-color: transparent;
    margin-bottom: 8px;
    text-align: left;
    border: 1px solid transparent;
}

.nav-pills .nav-link:hover {
    background-color: #f1f5f9;
    color: var(--accent-color) !important;
}

.nav-pills .nav-link.active {
    background-color: #10b981 !important; 
    color: #ffffff !important; 
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}


.nav-pills .nav-link i {
    width: 20px;
    margin-right: 10px;
}
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fas fa-recycle me-2"></i>ECOSMART AI</a>
            <div class="ms-auto">
                <a href="login.html" class="btn btn-outline-danger btn-sm px-4">Logout</a>
            </div>
        </div>
    </nav>

    <div class="profile-header"></div>

    <div class="container">
        <div class="row">
            <div class="col-lg-4">
                <div class="profile-card text-center mb-4">
                    <div class="user-avatar-wrapper">
                        <img src="https://i.pravatar.cc/150?u=johndoe" class="user-avatar" alt="User">
                        <div class="edit-avatar-btn"><i class="fas fa-camera"></i></div>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">John Doe</h3>
                    <p class="text-muted small mb-3">Eco-Citizen since Jan 2026</p>
                    
                    <div class="row g-2 mb-4">
                        <div class="col-6">
                            <div class="stat-card-mini">
                                <h5 class="fw-bold text-success mb-0">124kg</h5>
                                <small class="text-muted">Recycled</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="stat-card-mini">
                                <h5 class="fw-bold text-success mb-0">2.5k</h5>
                                <small class="text-muted">Points</small>
                            </div>
                        </div>
                    </div>

                    <div class="nav flex-column nav-pills text-start">
                        <button class="nav-link active mb-2" data-bs-toggle="pill" data-bs-target="#personal-info"><i class="fas fa-user me-2"></i> Personal Details</button>
                        <button class="nav-link mb-2" data-bs-toggle="pill" data-bs-target="#security"><i class="fas fa-lock me-2"></i> Password & Security</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="profile-card mb-5">
                    <div class="tab-content">
                        
                        <div class="tab-pane fade show active" id="personal-info">
                            <h4 class="fw-bold text-dark mb-4">Account Settings</h4>
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">FULL NAME</label>
                                        <input type="text" class="form-control" value="John Doe">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                                        <input type="email" class="form-control" value="john@example.com">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">PHONE NUMBER</label>
                                        <input type="tel" class="form-control" value="+92 300 1234567">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted small fw-bold">CITY</label>
                                        <input type="text" class="form-control" value="Karachi">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label text-muted small fw-bold">HOME ADDRESS</label>
                                        <textarea class="form-control" rows="3">Street 12, Phase 6, DHA, Karachi</textarea>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <button type="button" class="btn btn-ai px-5 py-2 shadow-sm">SAVE CHANGES</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="security">
                            <h4 class="fw-bold text-dark mb-4">Security Settings</h4>
                            <form>
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-bold">CURRENT PASSWORD</label>
                                    <input type="password" class="form-control" placeholder="••••••••">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small fw-bold">NEW PASSWORD</label>
                                    <input type="password" class="form-control" placeholder="Enter new password">
                                </div>
                                <div class="mb-4">
                                    <label class="form-label text-muted small fw-bold">CONFIRM PASSWORD</label>
                                    <input type="password" class="form-control" placeholder="Confirm new password">
                                </div>
                                <button type="button" class="btn btn-ai px-5">UPDATE PASSWORD</button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
